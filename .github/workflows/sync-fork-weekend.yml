name: Sync fork every weekend

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve upstream repository
        id: upstream
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const { data } = await github.rest.repos.get({ owner, repo });
            if (!data.fork || !data.parent) {
              core.setFailed('This repository is not a fork or has no upstream parent.');
              return;
            }
            core.setOutput('full_name', data.parent.full_name);
            core.setOutput('default_branch', data.parent.default_branch);

      - name: Sync fork with upstream
        uses: repo-sync/github-sync@v2
        with:
          source_repo: ${{ steps.upstream.outputs.full_name }}
          source_branch: ${{ steps.upstream.outputs.default_branch }}
          destination_branch: ${{ github.event.repository.default_branch }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
